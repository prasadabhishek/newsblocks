name: Update News Map Data

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'src/data.js'
      - 'public/sitemap.xml'
  schedule:
    # Weekdays (Mon-Fri): Hourly 7am-1pm, every 3 hours until 10pm, sleep until 5am PST
    - cron: '0 0,3,6,13,15,16,17,18,19,20,21 * * 1-5'
    # Weekends (Sat-Sun): Ultra-low frequency, 3 times a day (8 AM, 12 PM, 4 PM PST)
    - cron: '0 0,16,20 * * 0,6'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install


      - name: Run Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
        run: node scripts/gather-news.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data.js public/sitemap.xml src/engine/cache.json
          git commit -m "chore: auto-update news, sitemap & ai-cache [skip ci]" || echo "No changes to commit"
          git pull --rebase -X theirs origin main
          git push -u origin main
