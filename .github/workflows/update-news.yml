name: Update News Map Data

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'src/data.js'
      - 'public/sitemap.xml'
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Restore/Save AI Cache
        uses: actions/cache@v4
        with:
          path: src/engine/cache.json
          key: ai-cache-${{ github.run_id }}
          restore-keys: |
            ai-cache-

      - name: Run Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/gather-news.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data.js public/sitemap.xml
          git commit -m "chore: auto-update news & sitemap [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push -u origin main
